<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>文字修仙 - 凡人修仙录</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0f23;
    color: #d4c5a9;
    font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 600px;
    margin: 0 auto;
    padding: 16px;
  }
  h1 { text-align: center; color: #c9a96e; margin-bottom: 12px; font-size: 1.6rem; }
  .panel {
    background: #1a1a2e;
    border: 1px solid #2d2d44;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; font-size: 0.85rem; }
  .stat-item { display: flex; justify-content: space-between; }
  .stat-label { color: #8b7d6b; }
  .stat-value { color: #c9a96e; font-weight: bold; }
  .progress-bar {
    width: 100%; height: 6px; background: #2d2d44; border-radius: 3px; margin-top: 4px; overflow: hidden;
  }
  .progress-fill { height: 100%; transition: width 0.3s; }
  .progress-fill.hp { background: #e74c3c; }
  .progress-fill.mp { background: #3498db; }
  .progress-fill.exp { background: #c9a96e; }
  .btn-row { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  button {
    flex: 1;
    min-width: 70px;
    padding: 10px 10px;
    background: #2d2d44;
    border: 1px solid #c9a96e;
    color: #c9a96e;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  button:hover { background: #c9a96e; color: #0f0f23; }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.4; cursor: not-allowed; border-color: #555; color: #555; }
  .log {
    flex: 1;
    overflow-y: auto;
    background: #0a0a18;
    border: 1px solid #2d2d44;
    border-radius: 8px;
    padding: 12px;
    font-size: 0.85rem;
    line-height: 1.6;
    max-height: 40vh;
  }
  .log-item { margin-bottom: 4px; padding: 2px 0; border-bottom: 1px solid #1a1a2e; }
  .log-time { color: #555; font-size: 0.75rem; }
  .log-damage { color: #e74c3c; }
  .log-heal { color: #2ecc71; }
  .log-buff { color: #f39c12; }
  .rarity-common { color: #aaa; }
  .rarity-rare { color: #4fc3f7; }
  .rarity-epic { color: #ba68c8; }
  .rarity-legendary { color: #ffd54f; }
  .modal {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 10;
  }
  .modal.show { display: flex; }
  .modal-content {
    background: #1a1a2e; border: 1px solid #c9a96e; border-radius: 10px;
    padding: 20px; max-width: 90%; width: 340px; text-align: center;
  }
  .modal-content h3 { color: #c9a96e; margin-bottom: 10px; }
  .modal-content p { font-size: 0.85rem; margin-bottom: 12px; }
  .bag-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 8px; }
  .bag-item {
    background: #2d2d44; border: 1px solid #444; border-radius: 4px;
    padding: 6px; text-align: center; font-size: 0.75rem; cursor: pointer;
  }
  .bag-item:hover { border-color: #c9a96e; }
  .bag-item .count { color: #c9a96e; font-weight: bold; }

  /* ============ 精美战斗面板（方案C） ============ */
  .battle-panel {
    background: #0f0f23;
    border: 2px solid #c9a96e;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 30px rgba(201,169,110,0.15);
  }

  /* 动态背景 - 根据境界变色 */
  .battle-bg {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 0;
    opacity: 0.4;
    transition: all 0.5s;
  }
  .bg-realm-0 { background: radial-gradient(ellipse at top, #1a3a1a 0%, #0f0f23 70%); }
  .bg-realm-1 { background: radial-gradient(ellipse at top, #1a3a3a 0%, #0f0f23 70%); }
  .bg-realm-2 { background: radial-gradient(ellipse at top, #3a1a3a 0%, #0f0f23 70%); }
  .bg-realm-3 { background: radial-gradient(ellipse at top, #3a2a1a 0%, #0f0f23 70%); }
  .bg-realm-4 { background: radial-gradient(ellipse at top, #1a1a3a 0%, #0f0f23 70%); }
  .bg-realm-5 { background: radial-gradient(ellipse at top, #2a1a3a 0%, #0f0f23 70%); }
  .bg-realm-6 { background: radial-gradient(ellipse at top, #3a1a2a 0%, #0f0f23 70%); }
  .bg-realm-7 { background: radial-gradient(ellipse at top, #2a3a1a 0%, #0f0f23 70%); }
  .bg-realm-8 { background: radial-gradient(ellipse at top, #1a2a3a 0%, #0f0f23 70%); }
  .bg-realm-9 { background: radial-gradient(ellipse at top, #ffd54f 0%, #0f0f23 70%); }

  /* 角色卡牌 */
  .char-card {
    position: relative;
    z-index: 2;
    background: rgba(26,26,46,0.9);
    border: 2px solid #2d2d44;
    border-radius: 12px;
    padding: 16px;
    width: 140px;
    text-align: center;
    transition: all 0.3s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  }
  .char-card.active {
    border-color: #c9a96e;
    box-shadow: 0 0 20px rgba(201,169,110,0.3), 0 4px 15px rgba(0,0,0,0.3);
  }

  /* 角色立绘区域 */
  .char-portrait {
    width: 80px;
    height: 80px;
    margin: 0 auto 8px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    position: relative;
    transition: all 0.3s;
    border: 3px solid #2d2d44;
    background: #0f0f23;
  }
  .char-card.active .char-portrait {
    border-color: #c9a96e;
    box-shadow: 0 0 15px rgba(201,169,110,0.4);
  }

  /* 角色光晕 */
  .char-portrait::after {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid transparent;
    transition: all 0.3s;
  }
  .char-card.active .char-portrait::after {
    border-color: rgba(201,169,110,0.3);
    animation: pulse-ring 2s ease-in-out infinite;
  }

  @keyframes pulse-ring {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.1); opacity: 0.2; }
  }

  .char-name {
    font-size: 0.85rem;
    color: #c9a96e;
    font-weight: bold;
    margin-bottom: 6px;
  }

  /* 血条美化 */
  .hp-bar-wrap {
    width: 100%;
    height: 10px;
    background: #1a1a2e;
    border-radius: 5px;
    overflow: hidden;
    border: 1px solid #2d2d44;
    margin-bottom: 4px;
    position: relative;
  }
  .hp-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
    position: relative;
  }
  .hp-bar-fill::after {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
  }
  .hp-bar-fill.high { background: #2ecc71; }
  .hp-bar-fill.mid { background: #f39c12; }
  .hp-bar-fill.low { background: #e74c3c; }

  .hp-text {
    font-size: 0.7rem;
    color: #888;
  }

  /* 战斗场景 */
  .battle-arena {
    position: relative;
    height: 220px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 20px;
    margin-bottom: 16px;
    z-index: 1;
  }

  /* VS 标记 */
  .vs-badge {
    font-size: 1.5rem;
    color: #c9a96e;
    font-weight: bold;
    z-index: 2;
    text-shadow: 0 0 10px rgba(201,169,110,0.5);
  }

  /* 攻击动画增强 */
  @keyframes lunge-player {
    0% { transform: translateX(0) scale(1); }
    30% { transform: translateX(100px) scale(1.2); filter: brightness(1.5); }
    60% { transform: translateX(100px) scale(1.1); }
    100% { transform: translateX(0) scale(1); }
  }
  @keyframes lunge-enemy {
    0% { transform: translateX(0) scale(1); }
    30% { transform: translateX(-100px) scale(1.2); filter: brightness(1.5); }
    60% { transform: translateX(-100px) scale(1.1); }
    100% { transform: translateX(0) scale(1); }
  }
  .portrait-attack-player {
    animation: lunge-player 0.6s ease;
  }
  .portrait-attack-enemy {
    animation: lunge-enemy 0.6s ease;
  }

  /* 受伤效果增强 */
  @keyframes hurt-shake {
    0%, 100% { transform: translateX(0) rotate(0deg); }
    15% { transform: translateX(-15px) rotate(-8deg); }
    30% { transform: translateX(15px) rotate(8deg); }
    45% { transform: translateX(-10px) rotate(-5deg); }
    60% { transform: translateX(10px) rotate(5deg); }
    75% { transform: translateX(-5px) rotate(-2deg); }
    90% { transform: translateX(5px) rotate(2deg); }
  }
  .portrait-hurt {
    animation: hurt-shake 0.6s ease;
    filter: grayscale(0.5) brightness(0.5) sepia(0.8) hue-rotate(-50deg) !important;
  }

  /* 伤害数字 - 更炫酷 */
  @keyframes damage-rise {
    0% { transform: translate(-50%, 0) scale(0.3); opacity: 0; }
    15% { transform: translate(-50%, -30px) scale(1.5); opacity: 1; }
    40% { transform: translate(-50%, -50px) scale(1.2); opacity: 1; }
    100% { transform: translate(-50%, -90px) scale(0.8); opacity: 0; }
  }
  .dmg-num {
    position: absolute;
    top: -10px;
    left: 50%;
    font-size: 2rem;
    font-weight: bold;
    pointer-events: none;
    z-index: 20;
    animation: damage-rise 1.2s ease-out forwards;
    text-shadow: 0 0 10px currentColor, 0 0 20px currentColor;
  }
  .dmg-normal { color: #e74c3c; }
  .dmg-crit { 
    color: #ffd700; 
    font-size: 2.6rem;
    text-shadow: 0 0 15px #ffd700, 0 0 30px #ff6b00, 0 0 45px rgba(255,107,0,0.5);
  }
  .dmg-heal { 
    color: #00ff88; 
    text-shadow: 0 0 10px #00ff88, 0 0 20px rgba(0,255,136,0.5);
  }

  /* 技能特效 - 全屏光效 */
  @keyframes slash-sweep {
    0% { opacity: 0; transform: translateX(-100px) scaleX(0.3) rotate(-30deg); }
    30% { opacity: 1; transform: translateX(0) scaleX(1.5) rotate(0deg); }
    100% { opacity: 0; transform: translateX(100px) scaleX(2) rotate(30deg); }
  }
  @keyframes fire-burst {
    0% { opacity: 0; transform: scale(0.2); filter: blur(10px); }
    40% { opacity: 1; transform: scale(1.8); filter: blur(0px); }
    100% { opacity: 0; transform: scale(3); filter: blur(5px); }
  }
  @keyframes sword-glow {
    0% { opacity: 0; transform: scale(0.5); filter: blur(5px) brightness(1); }
    50% { opacity: 1; transform: scale(2.5); filter: blur(2px) brightness(3); }
    100% { opacity: 0; transform: scale(4); filter: blur(0px) brightness(1); }
  }

  .fx-overlay {
    position: absolute;
    pointer-events: none;
    z-index: 15;
    font-size: 4rem;
  }
  .fx-slash {
    animation: slash-sweep 0.5s ease-out forwards;
    color: #fff;
    text-shadow: 0 0 20px #e74c3c, 0 0 40px #e74c3c;
  }
  .fx-fire {
    animation: fire-burst 0.7s ease-out forwards;
    color: #ff6b00;
    text-shadow: 0 0 30px #ff6b00, 0 0 60px #ff0000;
  }
  .fx-sword {
    animation: sword-glow 0.8s ease-out forwards;
    color: #ffd700;
    text-shadow: 0 0 30px #ffd700, 0 0 60px #fff;
  }
  .fx-heal {
    animation: fire-burst 0.6s ease-out forwards;
    color: #00ff88;
    text-shadow: 0 0 20px #00ff88;
  }

  /* 屏幕震动（暴击时） */
  @keyframes screen-shake {
    0%, 100% { transform: translate(0, 0); }
    10% { transform: translate(-5px, 3px); }
    20% { transform: translate(5px, -3px); }
    30% { transform: translate(-3px, 5px); }
    40% { transform: translate(3px, -5px); }
    50% { transform: translate(-2px, 2px); }
    60% { transform: translate(2px, -2px); }
    70% { transform: translate(-1px, 1px); }
    80% { transform: translate(1px, -1px); }
  }
  .screen-shake {
    animation: screen-shake 0.4s ease;
  }

  /* 回合指示器 */
  .turn-bar {
    text-align: center;
    color: #c9a96e;
    font-size: 0.9rem;
    margin-bottom: 12px;
    padding: 8px;
    background: rgba(15,15,35,0.8);
    border-radius: 8px;
    border: 1px solid #2d2d44;
    position: relative;
    z-index: 1;
  }

  /* 粒子效果容器 */
  .particles {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    overflow: hidden;
  }
  .particle {
    position: absolute;
    width: 4px;
    height: 4px;
    border-radius: 50%;
    animation: particle-float 3s ease-in-out infinite;
  }
  @keyframes particle-float {
    0%, 100% { transform: translateY(0) opacity(0); }
    50% { opacity: 0.6; }
    100% { transform: translateY(-200px); opacity: 0; }
  }

  /* 胜利/失败 */
  @keyframes victory-jump {
    0%, 100% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-25px) scale(1.15); }
    60% { transform: translateY(-10px) scale(1.05); }
  }
  .victory-anim .char-portrait {
    animation: victory-jump 0.5s ease 4;
    border-color: #ffd700 !important;
    box-shadow: 0 0 30px rgba(255,215,0,0.5) !important;
  }
  @keyframes defeat-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(40px) rotate(15deg); opacity: 0; }
  }
  .defeat-anim .char-portrait {
    animation: defeat-fall 1s ease forwards;
  }

  /* 战斗按钮 */
  .battle-actions {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    position: relative;
    z-index: 1;
  }
  .battle-actions button {
    padding: 14px 8px;
    font-size: 0.9rem;
    border-width: 2px;
  }
  .battle-actions button.attack { border-color: #e74c3c; color: #e74c3c; }
  .battle-actions button.attack:hover { background: #e74c3c; color: #fff; }
  .battle-actions button.spell { border-color: #3498db; color: #3498db; }
  .battle-actions button.spell:hover { background: #3498db; color: #fff; }
  .battle-actions button.item { border-color: #2ecc71; color: #2ecc71; }
  .battle-actions button.item:hover { background: #2ecc71; color: #fff; }
  .battle-actions button.flee { border-color: #9b59b6; color: #9b59b6; }
  .battle-actions button.flee:hover { background: #9b59b6; color: #fff; }
  .battle-actions button.weapon { border-color: #ffd54f; color: #ffd54f; }
  .battle-actions button.weapon:hover { background: #ffd54f; color: #0f0f23; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<h1>🗡 凡人修仙录</h1>

<!-- 正常面板 -->
<div id="normalPanel">
  <div class="panel">
    <div class="stats">
      <div class="stat-item"><span class="stat-label">境界</span><span class="stat-value" id="realm">练气 1层</span></div>
      <div class="stat-item"><span class="stat-label">寿元</span><span class="stat-value" id="lifespan">100/100</span></div>
      <div class="stat-item"><span class="stat-label">修为</span><span class="stat-value" id="exp">0 / 100</span></div>
      <div class="stat-item"><span class="stat-label">灵气</span><span class="stat-value" id="spirit">0</span></div>
      <div class="stat-item"><span class="stat-label">灵石</span><span class="stat-value" id="stones">0</span></div>
      <div class="stat-item"><span class="stat-label">战力</span><span class="stat-value" id="power">10</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill exp" id="expBar" style="width:0%"></div></div>
  </div>

  <div class="btn-row" id="mainButtons">
    <button onclick="game.cultivate()">🧘 打坐修炼</button>
    <button onclick="game.explore()">🏔 外出历练</button>
    <button onclick="game.breakthrough()">⚡ 突破境界</button>
    <button onclick="game.showBag()">🎒 储物袋</button>
  </div>

  <div class="btn-row" id="secondaryButtons">
    <button onclick="game.showShop()">🏪 坊市</button>
    <button onclick="game.rest()">🛌 闭关修养</button>
    <button onclick="game.enterBattle()">⚔️ 斗法</button>
  </div>
</div>

<!-- 战斗面板 -->
<div id="battlePanel" class="hidden">
  <div class="battle-panel" id="battlePanelInner">
    <div class="battle-bg" id="battleBg"></div>
    <div class="particles" id="particles"></div>

    <div class="turn-bar" id="turnIndicator">⚔️ 第 1 回合 - 你的回合</div>

    <div class="battle-arena" id="battleArena">
      <!-- 玩家 -->
      <div class="char-card active" id="playerCard">
        <div class="char-portrait" id="playerPortrait">🧘‍♂️</div>
        <div class="char-name">你</div>
        <div class="hp-bar-wrap">
          <div class="hp-bar-fill high" id="playerHpFill" style="width:100%"></div>
        </div>
        <div class="hp-text" id="playerHpText">100/100</div>
      </div>

      <!-- VS -->
      <div class="vs-badge">VS</div>

      <!-- 敌人 -->
      <div class="char-card" id="enemyCard">
        <div class="char-portrait" id="enemyPortrait">🐺</div>
        <div class="char-name" id="enemyName">🐺 妖兽</div>
        <div class="hp-bar-wrap">
          <div class="hp-bar-fill high" id="enemyHpFill" style="width:100%"></div>
        </div>
        <div class="hp-text" id="enemyHpText">80/80</div>
      </div>
    </div>

    <div class="battle-actions" id="battleActions">
      <button class="attack" onclick="battle.playerAction('attack')">
        🗡️ 普通攻击
      </button>
      <button class="spell" onclick="battle.playerAction('spell')">
        🔥 释放法术<br><small>消耗10法力</small>
      </button>
      <button class="item" onclick="battle.playerAction('item')">
        💊 服用丹药
      </button>
      <button class="flee" onclick="battle.playerAction('flee')">
        🏃 逃跑
      </button>
      <button class="weapon" onclick="battle.playerAction('weapon')">
        ⚔️ 法宝攻击<br><small>飞剑</small>
      </button>
    </div>
  </div>
</div>

<div class="log" id="log"></div>

<!-- 突破弹窗 -->
<div class="modal" id="breakModal">
  <div class="modal-content">
    <h3>⚡ 境界突破</h3>
    <p id="breakText">修为已满，是否尝试突破？</p>
    <button onclick="game.confirmBreak()">突破</button>
    <button onclick="game.closeModal()">再等等</button>
  </div>
</div>

<!-- 背包弹窗 -->
<div class="modal" id="bagModal">
  <div class="modal-content" style="width: 380px;">
    <h3>🎒 储物袋</h3>
    <div class="bag-grid" id="bagGrid"></div>
    <button onclick="game.closeModal()">关闭</button>
  </div>
</div>

<!-- 通用弹窗 -->
<div class="modal" id="eventModal">
  <div class="modal-content">
    <h3 id="eventTitle">事件</h3>
    <p id="eventDesc"></p>
    <button onclick="game.closeModal()">知道了</button>
  </div>
</div>

<script>
const REALMS = [
  { name: "练气", layers: 9, expBase: 100, spiritGain: 5, power: 10, hp: 100, mp: 50 },
  { name: "筑基", layers: 9, expBase: 300, spiritGain: 15, power: 50, hp: 300, mp: 150 },
  { name: "金丹", layers: 9, expBase: 800, spiritGain: 40, power: 200, hp: 800, mp: 400 },
  { name: "元婴", layers: 9, expBase: 2000, spiritGain: 100, power: 800, hp: 2000, mp: 1000 },
  { name: "化神", layers: 9, expBase: 5000, spiritGain: 250, power: 3000, hp: 5000, mp: 2500 },
  { name: "炼虚", layers: 9, expBase: 12000, spiritGain: 600, power: 10000, hp: 12000, mp: 6000 },
  { name: "合体", layers: 9, expBase: 30000, spiritGain: 1500, power: 30000, hp: 30000, mp: 15000 },
  { name: "大乘", layers: 9, expBase: 80000, spiritGain: 4000, power: 100000, hp: 80000, mp: 40000 },
  { name: "渡劫", layers: 9, expBase: 200000, spiritGain: 10000, power: 500000, hp: 200000, mp: 100000 },
  { name: "真仙", layers: 1, expBase: 999999, spiritGain: 50000, power: 999999, hp: 999999, mp: 500000 }
];

const ITEMS = {

  { text: "误入妖兽领地，拼死一战后负伤而归，但实战经验大增", reward: { exp: 20, hpPill: 1 }, cost: { hp: 10 }, weight: 20 },

  { text: "误入仙家药园，偷得一枚寿元丹", reward: { elixir: 1 }, weight: 2 },
  { text: "在山中打坐三日，心境通明，修为大涨", reward: { exp: 50, spirit: 30 }, cost: { lifespan: 3 }, weight: 15 },
];

const ENEMY_EMOJIS = ["🐺", "🐍", "🦅", "🐗", "🦂", "🐯", "🦎", "🕷️", "🦇", "🐊", "👹", "💀", "👺", "🧟", "🐉"];
const ENEMY_NAMES = [
  "山狼", "毒蛇", "铁羽鹰", "钢牙猪", "毒蝎",
  "斑纹虎", "地龙", "人面蛛", "血蝠", "沼泽鳄",
  "山魈", "骷髅兵", "魔修", "尸傀", "蛟龙"
];

// ============ 战斗系统 ============
class Battle {
  constructor(game) {
    this.game = game;
    this.active = false;
    this.turn = 1;
    this.player = null;
    this.enemy = null;
    this.playerTurn = true;
    this.weaponUsed = false;
  }

  start() {
    const g = this.game;
    const r = g.getRealm();

    // 玩家战斗属性
    this.player = {
      name: "你",
      emoji: g.realmIndex >= 5 ? "👤" : "🧘‍♂️",
      maxHp: r.hp + g.layer * r.hp * 0.1,
      hp: r.hp + g.layer * r.hp * 0.1,
      maxMp: r.mp + g.layer * r.mp * 0.1,
      mp: r.mp + g.layer * r.mp * 0.1,
      attack: g.power,
      defense: Math.floor(g.power * 0.3),
      speed: g.layer + g.realmIndex * 10,
      critRate: 0.05 + g.realmIndex * 0.02
    };
    this.player.hp = this.player.maxHp;
    this.player.mp = this.player.maxMp;

    // 生成敌人
    const idx = Math.min(g.realmIndex, ENEMY_EMOJIS.length - 1);
    const enemyPower = Math.floor(r.power * (0.7 + Math.random() * 0.6) * (1 + g.layer * 0.05));
    const enemyHp = Math.floor(r.hp * (0.7 + Math.random() * 0.6) * (1 + g.layer * 0.05));
    const enemyMp = Math.floor(r.mp * 0.5);

    this.enemy = {
      name: ENEMY_NAMES[idx],
      emoji: ENEMY_EMOJIS[idx],
      maxHp: enemyHp,
      hp: enemyHp,
      maxMp: enemyMp,
      mp: enemyMp,
      attack: enemyPower,
      defense: Math.floor(enemyPower * 0.25),
      speed: g.layer + g.realmIndex * 10 + Math.floor(Math.random() * 5 - 2),
      critRate: 0.03 + g.realmIndex * 0.015
    };

    this.active = true;
    this.turn = 1;
    this.weaponUsed = false;
    this.playerTurn = this.player.speed >= this.enemy.speed;

    this.showUI();
    this.updateUI();
    this.spawnParticles();
    this.game.log(`⚔️ 遭遇 ${this.enemy.emoji} ${this.enemy.name}！战斗开始！`);

    if (!this.playerTurn) {
      setTimeout(() => this.enemyAction(), 800);
    }
  }

  showUI() {
    document.getElementById('normalPanel').classList.add('hidden');
    document.getElementById('battlePanel').classList.remove('hidden');
    document.getElementById('playerPortrait').textContent = this.player.emoji;
    document.getElementById('enemyPortrait').textContent = this.enemy.emoji;
    document.getElementById('enemyName').textContent = `${this.enemy.emoji} ${this.enemy.name}`;
    document.getElementById('battlePanelInner').classList.remove('victory-anim', 'defeat-anim');
    document.getElementById('battleArena').classList.remove('screen-shake');

    // 设置背景
    const bg = document.getElementById('battleBg');
    bg.className = `battle-bg bg-realm-${Math.min(this.game.realmIndex, 9)}`;
  }

  hideUI() {
    document.getElementById('normalPanel').classList.remove('hidden');
    document.getElementById('battlePanel').classList.add('hidden');
  }

  spawnParticles() {
    const container = document.getElementById('particles');
    container.innerHTML = '';
    const colors = ['#c9a96e', '#e74c3c', '#3498db', '#2ecc71', '#9b59b6'];
    for (let i = 0; i < 15; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.top = Math.random() * 100 + '%';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDelay = Math.random() * 3 + 's';
      p.style.animationDuration = (2 + Math.random() * 2) + 's';
      container.appendChild(p);
    }
  }

  updateUI() {
    const p = this.player;
    const e = this.enemy;

    document.getElementById('playerHpText').textContent = `${Math.floor(p.hp)}/${Math.floor(p.maxHp)}`;
    const phpPct = Math.max(0, p.hp / p.maxHp * 100);
    const pHpFill = document.getElementById('playerHpFill');
    pHpFill.style.width = phpPct + '%';
    pHpFill.className = `hp-bar-fill ${phpPct > 50 ? 'high' : phpPct > 25 ? 'mid' : 'low'}`;

    document.getElementById('enemyHpText').textContent = `${Math.floor(e.hp)}/${Math.floor(e.maxHp)}`;
    const ehpPct = Math.max(0, e.hp / e.maxHp * 100);
    const eHpFill = document.getElementById('enemyHpFill');
    eHpFill.style.width = ehpPct + '%';
    eHpFill.className = `hp-bar-fill ${ehpPct > 50 ? 'high' : ehpPct > 25 ? 'mid' : 'low'}`;

    document.getElementById('turnIndicator').textContent =
      this.playerTurn ? `⚔️ 第 ${this.turn} 回合 - 你的回合` : `⚔️ 第 ${this.turn} 回合 - ${e.emoji} ${e.name}的回合`;

    document.getElementById('playerCard').classList.toggle('active', this.playerTurn);
    document.getElementById('enemyCard').classList.toggle('active', !this.playerTurn);

    const buttons = document.querySelectorAll('#battleActions button');
    buttons.forEach(btn => btn.disabled = !this.playerTurn || !this.active);
    if (this.player.mp < 10) buttons[1].disabled = true;
    if (this.weaponUsed || !this.game.bag.weapon) buttons[4].disabled = true;
  }

  // 动画效果
  showDamage(target, damage, isCrit = false, isHeal = false) {
    const container = target === 'player' ? document.getElementById('playerCard') : document.getElementById('enemyCard');
    const div = document.createElement('div');
    div.className = `dmg-num ${isCrit ? 'dmg-crit' : isHeal ? 'dmg-heal' : 'dmg-normal'}`;
    div.textContent = isHeal ? `+${damage}` : isCrit ? `暴击! -${damage}` : `-${damage}`;
    container.appendChild(div);
    setTimeout(() => div.remove(), 1200);
  }

  showEffect(type, target) {
    const container = target === 'player' ? document.getElementById('playerCard') : document.getElementById('enemyCard');
    const effect = document.createElement('div');
    effect.className = 'fx-overlay';

    if (type === 'slash') {
      effect.textContent = '⚔️';
      effect.classList.add('fx-slash');
    } else if (type === 'spell') {
      effect.textContent = '🔥';
      effect.classList.add('fx-fire');
    } else if (type === 'weapon') {
      effect.textContent = '⚡';
      effect.classList.add('fx-sword');
    } else if (type === 'heal') {
      effect.textContent = '💚';
      effect.classList.add('fx-heal');
    }

    container.appendChild(effect);
    setTimeout(() => effect.remove(), 800);
  }

  animateAttack(attacker) {
    if (attacker === 'player') {
      document.getElementById('playerPortrait').classList.add('portrait-attack-player');
      setTimeout(() => document.getElementById('playerPortrait').classList.remove('portrait-attack-player'), 600);
    } else {
      document.getElementById('enemyPortrait').classList.add('portrait-attack-enemy');
      setTimeout(() => document.getElementById('enemyPortrait').classList.remove('portrait-attack-enemy'), 600);
    }
  }

  animateHurt(target) {
    if (target === 'player') {
      document.getElementById('playerPortrait').classList.add('portrait-hurt');
      setTimeout(() => document.getElementById('playerPortrait').classList.remove('portrait-hurt'), 600);
    } else {
      document.getElementById('enemyPortrait').classList.add('portrait-hurt');
      setTimeout(() => document.getElementById('enemyPortrait').classList.remove('portrait-hurt'), 600);
    }
  }

  screenShake() {
    document.getElementById('battleArena').classList.add('screen-shake');
    setTimeout(() => document.getElementById('battleArena').classList.remove('screen-shake'), 400);
  }

  playerAction(action) {
    if (!this.active || !this.playerTurn) return;

    const p = this.player;
    const e = this.enemy;
    let damage = 0;
    let isCrit = false;

    switch(action) {
      case 'attack':
        this.animateAttack('player');
        damage = this.calcDamage(p.attack, e.defense, p.critRate);
        isCrit = damage > p.attack * 1.3;
        setTimeout(() => {
          e.hp -= damage;
          this.showEffect('slash', 'enemy');
          this.animateHurt('enemy');
          this.showDamage('enemy', damage, isCrit);
          if (isCrit) this.screenShake();
          this.game.log(`你使出普通攻击，造成 ${damage} 点伤害！`);
          this.updateUI();
          this.checkWin();
        }, 300);
        return;

      case 'spell':
        if (p.mp < 10) { this.game.log("法力不足！"); return; }
        p.mp -= 10;
        this.animateAttack('player');
        damage = this.calcDamage(p.attack * 1.5, e.defense, p.critRate);
        isCrit = damage > p.attack * 1.5 * 1.3;
        setTimeout(() => {
          e.hp -= damage;
          this.showEffect('spell', 'enemy');
          this.animateHurt('enemy');
          this.showDamage('enemy', damage, isCrit);
          if (isCrit) this.screenShake();
          this.game.log(`你运转灵力释放法术🔥，造成 ${damage} 点伤害！`);
          this.updateUI();
          this.checkWin();
        }, 300);
        return;

      case 'weapon':
        if (this.weaponUsed) return;
        this.weaponUsed = true;
        this.animateAttack('player');
        damage = this.calcDamage(p.attack * 2.2, e.defense, p.critRate);
        isCrit = damage > p.attack * 2.2 * 1.3;
        setTimeout(() => {
          e.hp -= damage;
          this.showEffect('weapon', 'enemy');
          this.animateHurt('enemy');
          this.showDamage('enemy', damage, isCrit);
          this.screenShake();
          this.game.log(`你祭起飞剑⚡，剑气纵横！造成 ${damage} 点伤害！`);
          this.updateUI();
          this.checkWin();
        }, 300);
        return;

      case 'item':
        this.useBattleItem();
        return;

      case 'flee':
        const fleeChance = 0.3 + (p.speed - e.speed) * 0.05;
        if (Math.random() < Math.min(fleeChance, 0.8)) {
          this.game.log("🏃 你成功脱身，逃离了战斗！");
          this.end(false);
          return;
        } else {
          this.game.log("你想逃跑，但被敌人拦住了去路！");
          this.playerTurn = false;
          this.updateUI();
          setTimeout(() => this.enemyAction(), 1000);
          return;
        }
    }
  }

  checkWin() {
    if (this.enemy.hp <= 0) {
      setTimeout(() => this.win(), 600);
      return;
    }
    this.playerTurn = false;
    this.updateUI();
    setTimeout(() => this.enemyAction(), 1000);
  }

  enemyAction() {
    if (!this.active) return;
    const p = this.player;
    const e = this.enemy;

    let action = 'attack';
    if (e.mp >= 10 && Math.random() < 0.4) action = 'spell';
    if (e.hp < e.maxHp * 0.3 && Math.random() < 0.3) action = 'heal';

    let damage = 0;
    let isCrit = false;

    switch(action) {
      case 'attack':
        this.animateAttack('enemy');
        damage = this.calcDamage(e.attack, p.defense, e.critRate);
        isCrit = damage > e.attack * 1.3;
        setTimeout(() => {
          p.hp -= damage;
          this.animateHurt('player');
          this.showDamage('player', damage, isCrit);
          if (isCrit) this.screenShake();
          this.game.log(`${e.emoji} ${e.name} 发动攻击，造成 ${damage} 点伤害！`);
          this.updateUI();
          if (p.hp <= 0) setTimeout(() => this.lose(), 600);
          else {
            this.turn++;
            this.playerTurn = true;
            this.updateUI();
          }
        }, 300);
        break;

      case 'spell':
        e.mp -= 10;
        this.animateAttack('enemy');
        damage = this.calcDamage(e.attack * 1.4, p.defense, e.critRate);
        isCrit = damage > e.attack * 1.4 * 1.3;
        setTimeout(() => {
          p.hp -= damage;
          this.showEffect('spell', 'player');
          this.animateHurt('player');
          this.showDamage('player', damage, isCrit);
          if (isCrit) this.screenShake();
          this.game.log(`${e.emoji} ${e.name} 释放妖术🔥，造成 ${damage} 点伤害！`);
          this.updateUI();
          if (p.hp <= 0) setTimeout(() => this.lose(), 600);
          else {
            this.turn++;
            this.playerTurn = true;
            this.updateUI();
          }
        }, 300);
        break;

      case 'heal':
        const heal = Math.floor(e.maxHp * 0.2);
        e.hp = Math.min(e.maxHp, e.hp + heal);
        this.showEffect('heal', 'enemy');
        this.showDamage('enemy', heal, false, true);
        this.game.log(`${e.emoji} ${e.name} 运功疗伤，恢复了 ${heal} 点气血💚！`);
        this.updateUI();
        this.turn++;
        this.playerTurn = true;
        this.updateUI();
        break;
    }
  }

  calcDamage(atk, def, critRate) {
    let dmg = Math.max(1, Math.floor(atk - def * 0.5 + Math.random() * atk * 0.2 - atk * 0.1));
    if (Math.random() < critRate) {
      dmg = Math.floor(dmg * 1.5);
    }
    return dmg;
  }

  useBattleItem() {
    const hasHpPill = this.game.bag.hpPill && this.game.bag.hpPill > 0;
    const hasMpPill = this.game.bag.mpPill && this.game.bag.mpPill > 0;

    if (!hasHpPill && !hasMpPill) {
      this.game.log("没有可用的战斗丹药！");
      return;
    }

    if (hasHpPill) {
      this.game.bag.hpPill--;
      if (this.game.bag.hpPill <= 0) delete this.game.bag.hpPill;
      const heal = Math.floor(this.player.maxHp * 0.3);
      this.player.hp = Math.min(this.player.maxHp, this.player.hp + heal);
      this.showEffect('heal', 'player');
      this.showDamage('player', heal, false, true);
      this.game.log(`你服下回春丹💚，恢复了 ${heal} 点气血！`);
    } else if (hasMpPill) {
      this.game.bag.mpPill--;
      if (this.game.bag.mpPill <= 0) delete this.game.bag.mpPill;
      const heal = Math.floor(this.player.maxMp * 0.3);
      this.player.mp = Math.min(this.player.maxMp, this.player.mp + heal);
      this.showEffect('heal', 'player');
      this.showDamage('player', heal, false, true);
      this.game.log(`你服下回灵丹💚，恢复了 ${heal} 点法力！`);
    }

    this.updateUI();
    this.playerTurn = false;
    setTimeout(() => this.enemyAction(), 1000);
  }

  win() {
    document.getElementById('battlePanelInner').classList.add('victory-anim');
    const g = this.game;
    const expGain = Math.floor(20 + g.realmIndex * 15 + Math.random() * 20);
    const stoneGain = Math.floor(2 + Math.random() * 5 + g.realmIndex);
    const r = Math.random();
    let extra = "";

    g.exp += expGain;
    g.stones += stoneGain;

    if (r < 0.3) { g.addBag('herb', 1); extra = "灵草 x1"; }
    else if (r < 0.5) { g.addBag('hpPill', 1); extra = "回春丹 x1"; }
    else if (r < 0.6) { g.addBag('mpPill', 1); extra = "回灵丹 x1"; }
    else if (r < 0.65) { g.addBag('skill', 1); extra = "功法残页 x1"; }

    this.game.log(`🎉 战斗胜利！修为 +${expGain}，灵石 +${stoneGain}${extra ? '，获得 ' + extra : ''}`);

    setTimeout(() => this.end(true), 1500);
  }

  lose() {
    document.getElementById('battlePanelInner').classList.add('defeat-anim');
    this.game.log("💀 你重伤倒地，敌人扬长而去...");
    this.game.lifespan -= 10;
    if (this.game.lifespan <= 0) {
      setTimeout(() => this.game.death("斗法失败，重伤不治，身死道消..."), 800);
    }
    setTimeout(() => this.end(false), 1000);
  }

  end(won) {
    this.active = false;
    setTimeout(() => {
      this.hideUI();
      this.game.updateUI();
    }, won ? 1500 : 800);
  }
}

// ============ 游戏主类 ============
class Game {
  constructor() {
    this.realmIndex = 0;
    this.layer = 1;
    this.exp = 0;
    this.spirit = 0;
    this.stones = 10;
    this.lifespan = 100;
    this.maxLifespan = 100;
    this.power = 10;
    this.bag = {};
    this.pillActive = false;
    this.pillTimer = null;
    this.cultivating = false;
    this.battle = new Battle(this);
    this.init();
  }

  init() {
    this.log("你出生在一个普通山村，偶然得到一本《基础吐纳法》，踏上了修仙之路...");
    this.updateUI();
  }

  getRealm() { return REALMS[this.realmIndex]; }
  getMaxExp() {
    const r = this.getRealm();
    return Math.floor(r.expBase * (1 + (this.layer - 1) * 0.2));
  }

  get maxHp() {
    const r = this.getRealm();
    return r.hp + this.layer * r.hp * 0.1;
  }
  get maxMp() {
    const r = this.getRealm();
    return r.mp + this.layer * r.mp * 0.1;
  }
  get hp() { return this._hp || this.maxHp; }
  set hp(v) { this._hp = v; }
  get mp() { return this._mp || this.maxMp; }
  set mp(v) { this._mp = v; }
  get defense() { return Math.floor(this.power * 0.3); }
  get speed() { return this.layer + this.realmIndex * 10; }

  cultivate() {
    if (this.cultivating || this.battle.active) return;
    this.cultivating = true;

    const r = this.getRealm();
    let gain = r.spiritGain;
    if (this.pillActive) gain *= 2;

    this.spirit += gain;
    let expGain = Math.max(1, Math.floor(gain * 0.3));
    this.exp += expGain;

    this.lifespan -= 0.1;
    if (this.lifespan <= 0) {
      this.death("寿元耗尽，坐化而终...");
      return;
    }

    if (this.spirit >= 10) {
      const convert = Math.floor(this.spirit / 10);
      this.spirit -= convert * 10;
      this.exp += convert * 2;
    }

    this.log(`打坐修炼，吸收灵气 +${gain}，修为 +${expGain}`);
    this.updateUI();
    setTimeout(() => { this.cultivating = false; }, 500);

    if (Math.random() < 0.05) {
      this.randomCultivationEvent();
    }
  }

  randomCultivationEvent() {
    const events = [
      "心有所悟，修为额外提升！",
      "灵气浓郁，修炼效率提升！",
      "略有分心，灵气散逸了一些..."
    ];
    const e = events[Math.floor(Math.random() * events.length)];
    if (e.includes("额外")) this.exp += 10;
    if (e.includes("散逸")) this.spirit = Math.max(0, this.spirit - 5);
    this.log(e);
    this.updateUI();
  }

  explore() {
    if (this.battle.active) return;
    this.lifespan -= 1;
    if (this.lifespan <= 0) {
      this.death("外出历练时寿元耗尽...");
      return;
    }

    const totalWeight = EXPLORE_EVENTS.reduce((s, e) => s + e.weight, 0);
    let rand = Math.random() * totalWeight;
    let event = EXPLORE_EVENTS[0];
    for (const e of EXPLORE_EVENTS) {
      rand -= e.weight;
      if (rand <= 0) { event = e; break; }
    }

    if (event.cost) {
      if (event.cost.stone && this.stones < event.cost.stone) {
        this.log("你想与商人交易，但灵石不够...");
        return;
      }
      if (event.cost.hp) this.lifespan -= event.cost.hp;
      if (event.cost.lifespan) this.lifespan -= event.cost.lifespan;
      if (event.cost.stone) this.stones -= event.cost.stone;
    }

    if (event.reward) {
      for (const [key, val] of Object.entries(event.reward)) {
        if (key === 'exp') this.exp += val;
        else if (key === 'spirit') this.spirit += val;
        else this.addBag(key, val);
      }
    }

    this.log(`🏔 ${event.text}`);
    this.updateUI();

    if (Math.random() < 0.3) {
      setTimeout(() => this.enterBattle(), 800);
      return;
    }

    document.getElementById('eventTitle').innerText = "历练奇遇";
    document.getElementById('eventDesc').innerText = event.text;
    document.getElementById('eventModal').classList.add('show');
  }

  enterBattle() {
    if (this.battle.active) return;
    this.battle.start();
  }

  breakthrough() {
    if (this.battle.active) return;
    const maxExp = this.getMaxExp();
    if (this.exp < maxExp) {
      this.log("修为不足，无法突破。继续修炼吧...");
      return;
    }
    document.getElementById('breakText').innerText =
      `${this.getRealm().name} ${this.layer}层修为已满，是否尝试突破到${this.layer >= this.getRealm().layers ? '下一境界' : (this.layer + 1) + '层'}？`;
    document.getElementById('breakModal').classList.add('show');
  }

  confirmBreak() {
    this.closeModal();
    const r = this.getRealm();
    const chance = this.layer >= r.layers ? 0.4 + this.spirit / 200 : 0.8 + this.spirit / 100;
    const success = Math.random() < Math.min(chance, 0.95);

    if (success) {
      this.exp = 0;
      this.spirit = 0;
      if (this.layer >= r.layers) {
        if (this.realmIndex >= REALMS.length - 1) {
          this.log("🎉 恭喜你，已修炼至真仙之境，游戏通关！");
          this.updateUI();
          return;
        }
        this.realmIndex++;
        this.layer = 1;
        const nr = this.getRealm();
        this.maxLifespan += 50;
        this.lifespan = this.maxLifespan;
        this.power = nr.power;
        this.log(`🎉 突破成功！晋升至 ${nr.name} 1层！寿元增加，战力暴涨！`);
      } else {
        this.layer++;
        this.power += Math.floor(r.power * 0.2);
        this.log(`✨ 突破成功！晋升至 ${r.name} ${this.layer}层！战力提升！`);
      }
    } else {
      this.exp = Math.floor(this.exp * 0.5);
      this.lifespan -= 5;
      this.log("💔 突破失败！修为倒退，还受了内伤...");
      if (this.lifespan <= 0) { this.death("突破失败，重伤不治..."); return; }
    }
    this.updateUI();
  }

  rest() {
    if (this.battle.active) return;
    this.lifespan = Math.min(this.lifespan + 10, this.maxLifespan);
    this._hp = this.maxHp;
    this._mp = this.maxMp;
    this.log("🛌 闭关修养，恢复寿元、气血与法力...");
    this.updateUI();
  }

  addBag(itemKey, count) {
    this.bag[itemKey] = (this.bag[itemKey] || 0) + count;
  }

  showBag() {
    if (this.battle.active) return;
    const grid = document.getElementById('bagGrid');
    grid.innerHTML = '';
    const keys = Object.keys(this.bag);
    if (keys.length === 0) {
      grid.innerHTML = '<div style="grid-column: span 4; text-align:center; color:#555;">储物袋空空如也</div>';
    } else {
      for (const key of keys) {
        const item = ITEMS[key];
        const div = document.createElement('div');
        div.className = 'bag-item';
        div.innerHTML = `<div class="rarity-${item.rarity}">${item.name}</div><div class="count">x${this.bag[key]}</div><div style="font-size:0.65rem;color:#666;margin-top:2px;">${item.desc}</div>`;
        div.onclick = () => this.useItem(key);
        grid.appendChild(div);
      }
    }
    document.getElementById('bagModal').classList.add('show');
  }

  useItem(key) {
    if (!this.bag[key] || this.bag[key] <= 0) return;
    this.bag[key]--;
    if (this.bag[key] <= 0) delete this.bag[key];

    switch(key) {
      case 'herb': this.exp += 20; this.log("服下灵草，修为增加 20"); break;
      case 'pill':
        this.pillActive = true;
        this.log("服下聚气丹，修炼速度翻倍 30 秒！");
        if (this.pillTimer) clearTimeout(this.pillTimer);
        this.pillTimer = setTimeout(() => {
          this.pillActive = false;
          this.log("聚气丹效果消退...");
        }, 30000);
        break;
      case 'skill': this.power += 50; this.log("参悟功法残页，战力提升 50"); break;
      case 'weapon': this.power += 200; this.log("祭炼飞剑，战力提升 200（战斗中可祭出攻击）"); break;
      case 'elixir': this.maxLifespan += 10; this.lifespan += 10; this.log("服下寿元丹，寿元增加 10 年"); break;
    }
    this.updateUI();
    this.showBag();
  }

  showShop() {
    if (this.battle.active) return;
    if (this.stones >= 10) {
      this.stones -= 10;
      this.addBag('pill', 1);
      this.log("🏪 在坊市用 10 灵石购得聚气丹 x1");
    } else {
      this.log("🏪 坊市里好东西不少，但你灵石不够...");
    }
    this.updateUI();
  }

  closeModal() {
    document.querySelectorAll('.modal').forEach(m => m.classList.remove('show'));
  }

  death(reason) {
    this.log(`☠️ ${reason}`);
    document.querySelectorAll('.btn-row button').forEach(b => b.disabled = true);
    document.getElementById('eventTitle').innerText = "身死道消";
    document.getElementById('eventDesc').innerText = reason + "\n\n刷新页面重新开始...";
    document.getElementById('eventModal').classList.add('show');
  }

  log(text) {
    const logEl = document.getElementById('log');
    const div = document.createElement('div');
    div.className = 'log-item';
    const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
    div.innerHTML = `<span class="log-time">[${time}]</span> ${text}`;
    logEl.insertBefore(div, logEl.firstChild);
    while (logEl.children.length > 50) logEl.removeChild(logEl.lastChild);
  }

  updateUI() {
    const r = this.getRealm();
    document.getElementById('realm').innerText = `${r.name} ${this.layer}层`;
    document.getElementById('lifespan').innerText = `${Math.floor(this.lifespan)}/${this.maxLifespan}`;
    document.getElementById('exp').innerText = `${Math.floor(this.exp)} / ${this.getMaxExp()}`;
    document.getElementById('spirit').innerText = Math.floor(this.spirit);
    document.getElementById('stones').innerText = this.stones;
    document.getElementById('power').innerText = this.power;
    const pct = Math.min(100, (this.exp / this.getMaxExp()) * 100);
    document.getElementById('expBar').style.width = pct + '%';
  }
}

const game = new Game();
const battle = game.battle;
</script>
